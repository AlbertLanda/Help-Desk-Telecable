{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <a href="{% url 'base_conocimientos' %}" class="text-blue-500 hover:underline mb-4 inline-block">&larr; Volver a la Wiki</a>
    
    <h1 class="text-3xl font-bold text-gray-800 mb-2">{{ articulo.titulo }}</h1>
    <p class="text-sm text-gray-500 mb-6">Publicado el: {{ articulo.fecha_creacion|date:"d M Y" }}</p>
    
    <div class="prose max-w-none text-gray-700">
        {{ articulo.contenido|safe }}
    </div>
</div>
{% endblock %}
